<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maxikiosco Junín | Tu Parada Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="kiosko.jpg" type="image/x-icon">
</head>
<body>
    
    <div class="main-wrapper fade-in" style="background-image: url('kiosko.jpg');">
        
        <div class="glass-card">
            
            <div class="status-badge-container">
                <div class="status-badge">
                    <span class="pulse-dot"></span>
                    Abierto Ahora
                </div>
            </div>

            <div class="header">
                <div class="logo-circle">
                   <i class="fa-solid fa-store"></i>
                </div>
                <h1 class="title">Maxikiosco Junín</h1>
                <p class="subtitle">Junín 1066 B | Recoleta</p>
            </div>

            <div class="divider"></div>

            <div class="featured-section">
                <h3><i class="fa-solid fa-bolt icon-accent"></i> Lo que tenemos para vos</h3>
                <div class="tags-grid">
                    <div class="tag-item">Golosinas</div>
                    <div class="tag-item">Bebidas Frías</div>
                    <div class="tag-item">Helados</div>
                    <div class="tag-item">Puchos</div>
                    <div class="tag-item">Snacks</div>
                    <div class="tag-item">Primera necesidad</div>
                </div>
            </div>

            <div class="divider"></div>

            <div class="payments-section">
                <h3><i class="fa-solid fa-credit-card icon-accent"></i> Aceptamos</h3>
                <div class="payments-grid">
                    <i class="fa-solid fa-money-bill-transfer"></i>
                    <i class="fa-solid fa-money-bill"></i>
                </div>
            </div>

            <div class="action-buttons">
                <a href="https://share.google/ek97aC0NZEct6DPew" target="_blank" class="btn btn-primary">
                    <i class="fa-solid fa-location-arrow"></i> ¿CÓMO LLEGAR?
                </a>
            </div>

            <div class="footer">
                <p>Tu kiosco de confianza, cerca tuyo.</p>
            </div>
        </div>
    </div>
</body>
</html>
